[tools]
node = "22.23.0"
bun = "1.3.14"

[tasks.dev]
description = "Start the Supaplane daemon in dev mode (TypeScript via tsx)"
run = "bun --watch run --cwd packages/server src/index.ts"

[tasks.dev-daemon]
description = "Start daemon only (no watch)"
run = "bun run --cwd packages/server src/index.ts"

[tasks.dev-web]
description = "Start Vite dev server for the web renderer"
run = "bun run --cwd packages/web dev"

[tasks.dev-desktop]
description = "Start Electron desktop shell with the daemon already running"
run = "bun run --cwd packages/desktop dev"

[tasks.dev-all]
description = "Start daemon + Vite + Electron in parallel (requires already-installed deps)"
run = "bunx concurrently -k -n daemon,web,desktop -c yellow,cyan,magenta 'mise run dev-daemon' 'mise run dev-web' 'mise run dev-desktop'"

[tasks.build]
description = "Build all workspaces in dependency order"
run = "bun run build"

[tasks.typecheck]
description = "Type-check all workspaces"
run = "bun run typecheck"

[tasks.lint]
description = "Lint all packages"
run = "bun run lint"

[tasks.fmt]
description = "Format all files"
run = "bun run format"

[tasks.fmt-check]
description = "Check formatting without writing"
run = "bun run format:check"

[tasks.test]
description = "Run all tests"
run = "bun test"

[tasks.clean]
description = "Remove all dist/ and node_modules/ build artifacts"
run = "bunx --workspaces rimraf dist node_modules .turbo"

[tasks.install-clean]
description = "Nuke node_modules and reinstall from scratch"
run = "rm -rf node_modules packages/*/node_modules && bun install"

[env]
SUPAPLANE_DEV_FRONTEND = "true"

[settings]
experimental = true
